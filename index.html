<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Proyecto base con Tailwind CSS listo para comenzar.">
  <title>Mi Proyecto Tailwind</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind compiled styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col justify-between">

  <header class="py-6 px-8 border-b border-slate-900">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <div class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
        Proyecto Tailwind
      </div>
      <nav>
        <a href="https://tailwindcss.com/docs" target="_blank" rel="noopener" class="text-sm text-slate-400 hover:text-slate-200 transition-colors">
          Documentación
        </a>
      </nav>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center p-6">
    <div class="text-center max-w-lg">
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
        Listo para Desarrollar
      </h1>
      <p class="text-slate-400 text-lg mb-8">
        Tu estructura de carpetas está configurada con Tailwind CSS CLI. Comienza a editar <code class="bg-slate-900 px-2 py-1 rounded text-pink-400 text-sm">index.html</code> para ver los cambios.
      </p>
    </div>
  </main>

  <footer class="py-6 border-t border-slate-900 text-center text-sm text-slate-500">
    &copy; <span id="year"></span> Proyecto Tailwind. Todos los derechos reservados.
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
